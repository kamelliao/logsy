name: Release

# Build installers and publish a GitHub Release whenever a version tag is pushed.
#   git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags:
      - 'v*'

# tauri-action needs write access to create the release and upload assets.
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS: a single universal (Intel + Apple Silicon) build.
          - platform: macos-latest
            args: --target universal-apple-darwin
          # Linux: build on 22.04 for the widest glibc compatibility.
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            build-essential \
            curl wget file \
            libxdo-dev \
            libssl-dev

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS universal binaries need both arch targets.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build app & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # The pushed tag (e.g. v0.2.0) is used as the release tag/name.
          tagName: ${{ github.ref_name }}
          releaseName: logsy ${{ github.ref_name }}
          releaseBody: Download the installer for your platform from the assets below.
          # Publish as a draft so you can review/edit notes before going live.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # Some corporate networks block .msi/.exe downloads outright. A zipped
      # portable binary usually gets through, so publish one as an extra asset.
      # Windows only — that's where the blocking bites. Note: the portable exe
      # still needs the WebView2 runtime, which ships with modern Edge/Windows.
      - name: Package & upload portable Windows zip
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $stage = Join-Path $env:RUNNER_TEMP "logsy-portable"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          # The raw binary is app.exe (Cargo package name); rename it on the
          # way in so users get a sensibly-named logsy.exe.
          Copy-Item "src-tauri/target/release/app.exe" (Join-Path $stage "logsy.exe")
          $zip = "logsy_${version}_x64-portable.zip"
          Compress-Archive -Path (Join-Path $stage "*") -DestinationPath $zip -Force
          gh release upload "${{ github.ref_name }}" $zip --clobber
